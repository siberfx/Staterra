server {
    listen 80;
    server_name staterra.nl www.staterra.nl;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Legacy redirects (301)
    rewrite ^/over-ons/woo-oplossing$     /woo-oplossing      permanent;
    rewrite ^/over-ons/samen-ontwikkelen$  /samen-ontwikkelen   permanent;
    rewrite ^/over-ons/open-source$        /open-source         permanent;
    rewrite ^/oplossingen/woo-oplossing$   /woo-oplossing       permanent;
    rewrite ^/solutions$                   /oplossingen         permanent;
    rewrite ^/solutions/(.+)$              /$1                  permanent;
    rewrite ^/blog$                        /kennisbank          permanent;
    rewrite ^/blog/(.+)$                   /kennisbank/$1       permanent;
    rewrite ^/ons-verhaal$                 /over-ons            permanent;
    rewrite ^/helpcentrum$                 /contact             permanent;
    rewrite ^/faq$                         /contact             permanent;
    rewrite ^/help$                        /contact             permanent;
    rewrite ^/support$                     /contact             permanent;
    rewrite ^/ondersteuning$               /contact             permanent;
    rewrite ^/werken-bij$                  /contact             permanent;
    rewrite ^/demo$                        /contact             permanent;
    rewrite ^/proefversie$                 /contact             permanent;
    rewrite ^/search$                      /kennisbank          redirect;
    rewrite ^/zoeken$                      /kennisbank          redirect;

    # Legacy /api/* browser paths
    rewrite ^/api/solutions$               /oplossingen         permanent;
    rewrite ^/api/solutions/(.+)$          /$1                  permanent;
    rewrite ^/api/blog$                    /kennisbank          permanent;
    rewrite ^/api/blog/(.+)$              /kennisbank/$1       permanent;
    rewrite ^/api/contact$                 /contact             permanent;
    rewrite ^/api/pages/(.+)$             /$1                  permanent;

    # Proxy API calls naar de CMS backend
    location /api/ {
        proxy_pass https://studio.staterra.nl;
        proxy_set_header Host studio.staterra.nl;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Vite hashed assets (JS/CSS) — immutable, 1 year cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images — 30 days cache
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Downloads (PDF etc.) — 7 days cache
    location /downloads/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon, robots, sitemap — 1 day cache
    location = /favicon.svg {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # index.html — nooit cachen (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
