services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staterra-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://studio.staterra.nl
      - VITE_SITE_URL=https://staterra.nl
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - staterra-net

networks:
  staterra-net:
    driver: bridge
