services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: staterra-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CMS_URL=https://studio.staterra.nl
      - NEXT_PUBLIC_SITE_URL=https://staterra.nl
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - staterra-net

networks:
  staterra-net:
    driver: bridge
