# SEO Content Brief — staterra.nl
#
# Doel: per route de definitieve <title>, <meta description> en (optioneel)
# overrides voor og:type, og:image en twitter:card vastleggen.
#
# Conventies:
#   title       — bestuurlijk geformuleerd, max ~60 tekens, zonder " — Staterra"
#                 (suffix wordt automatisch toegevoegd door PageMeta).
#   description — uniek per pagina, ~155 tekens, eindigt op een duidelijke
#                 CTA-strekking ("Lees meer", "Plan een oriëntatiegesprek", etc.).
#   og_type     — "website" (default) of "article" voor blog/kennisbank-stukken.
#   image       — pad naar 1200×630 JPG/PNG in /static (komt in /public na build).
#                 Default: /og-default.jpg.
#
# Vul `final: true` in zodra de copy goedgekeurd is en in seoConfig.ts kan landen.
# Velden die leeg blijven, vallen terug op de huidige waarde in seoConfig.ts.
#
# Bronmateriaal: OpenPublicatie-pakket april 2026 (propositie, NDS-leaflet,
# aansluitvarianten, onepager). Tone of voice: bestuurlijk, zakelijk, scherp.

